services:
  server:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
    container_name: nz-lms-server
    restart: unless-stopped
    ports:
      - "${SERVER_PORT:-41001}:3000"
    env_file:
      - apps/server/.env
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:3000/health",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
